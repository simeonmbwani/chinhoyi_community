<!-- dashboard/partials/notifications_panel.html -->
<div class="table-responsive">
    <table class="table table-striped table-hover table-sm align-middle shadow-sm mb-0">
        <thead class="table-dark sticky-top">
            <tr>
                <th>Message</th>
                <th>User</th>
                <th>Date</th>
            </tr>
        </thead>
        <tbody>
            {% for note in notifications %}
            <tr>
                <td class="text-truncate" style="max-width:200px;">{{ note.message }}</td>
                <td>{{ note.user.username }}</td>
                <td><small class="text-muted">{{ note.timestamp|date:"Y-m-d H:i" }}</small></td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" class="text-center text-muted">No notifications found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
