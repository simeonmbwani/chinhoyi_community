{% extends 'base.html' %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow-lg border-0 rounded-4 p-4">
        <h2 class="mb-4 text-success fw-bold text-center">✨ Share Your Feedback</h2>
        <p class="text-muted text-center">
            We value your input! Share your ideas to help us improve the platform.
        </p>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn btn-success w-100">Send Feedback</button>
        </form>
    </div>
</div>
{% endblock %}
